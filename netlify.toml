# Required environment variables for Netlify deployment:
# VITE_SUPABASE_URL - Your Supabase project URL
# VITE_SUPABASE_PUBLISHABLE_KEY - Your Supabase publishable (anon) key
# SUPABASE_URL - Same as VITE_SUPABASE_URL (for server-side)
# SUPABASE_PUBLISHABLE_KEY - Same as VITE_SUPABASE_PUBLISHABLE_KEY (for server-side)
# SUPABASE_SERVICE_ROLE_KEY - Your Supabase service role key (server-side only)
# ADMIN_PASSWORD - Admin dashboard password
# THIRDWEB_CLIENT_ID - Thirdweb bridge client ID
# TELEGRAM_BOT_TOKEN - Telegram bot token for notifications

[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Content-Security-Policy = "default-src 'self' https: data: blob: 'unsafe-inline' 'unsafe-eval'; img-src 'self' https: data: blob:; font-src 'self' https: data:; connect-src 'self' https: wss: data: blob:; frame-src 'self' https:; worker-src 'self' blob:"
